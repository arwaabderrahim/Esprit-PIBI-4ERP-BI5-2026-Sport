global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'padel-team'
  routes:
    - match:
        severity: critical
      receiver: 'padel-team-critical'
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: 'padel-team'
      repeat_interval: 1h

receivers:
  - name: 'padel-team'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/health'
        send_resolved: true

  - name: 'padel-team-critical'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/health'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
