services:

  # ── 1. FastAPI — ML Models serving ──────────────────────────────
  padel-analytics-api:
    build: .
    container_name: padel-analytics-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - padel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 2. Angular Frontend ──────────────────────────────────────────
  padel-frontend:
    build: ./padel-frontend
    container_name: padel-frontend
    ports:
      - "4200:80"
    restart: unless-stopped
    networks:
      - padel-net
    depends_on:
      - padel-analytics-api

  # ── 3. Prometheus — Metrics collection ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - padel-net

  # ── 4. Grafana — Dashboards & Visualization ─────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=padel2026
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - padel-net

  # ── 5. AlertManager — Alerts & Notifications ────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: unless-stopped
    networks:
      - padel-net

  # ── 6. n8n — Workflow Automation ────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - padel-net

volumes:
  prometheus_data:
  grafana_data:
  n8n_data:

networks:
  padel-net:
    driver: bridge
