version: '3.8'

services:
  padel-analytics-api:
    build: .
    container_name: padel-analytics-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./predictions.log:/app/predictions.log
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-output:/data     # ← Dossier sur ton PC
    restart: unless-stopped

volumes:
  n8n_data: